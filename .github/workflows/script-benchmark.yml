name: Scripting Benchmark

on:
  workflow_dispatch:
    inputs:
      jmh_args:
        description: "Extra JMH args, e.g. --forks 1 --warmup 3 --measure 5"
        required: false
        default: ""
        type: string
      enable_jfr:
        description: "Enable Java Flight Recorder"
        required: true
        default: false
        type: boolean

jobs:
  prepare-matrix:
    name: Prepare benchmark matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      extra_jmh_args: ${{ steps.matrix.outputs.extra_jmh_args }}

    steps:
      - name: Build matrix from JMH args
        id: matrix
        env:
          INPUT_JMH_ARGS: ${{ inputs.jmh_args }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import shlex

          engines = [
              "GraalJS",
              "Nashorn",
              "Jexl",
              "KotlinScripting",
              "Fluxon",
          ]
          phases = ["compile", "compiledExecution", "interpretedExecution"]
          phase_aliases = {
              "compile": ["compile"],
              "compiledExecution": ["compiled", "compiledExecution", "runCompiled"],
              "interpretedExecution": ["interpret", "interpreted", "interpretedExecution"],
              "all": ["all"],
          }

          def option_value(tokens, option):
              for index, token in enumerate(tokens):
                  if token == option:
                      if index + 1 >= len(tokens):
                          raise SystemExit(f"{option} 需要一个值")
                      return tokens[index + 1]
              return None

          def strip_options(tokens, options):
              stripped = []
              skip_next = False
              for token in tokens:
                  if skip_next:
                      skip_next = False
                      continue
                  if token in options:
                      skip_next = True
                      continue
                  stripped.append(token)
              return stripped

          raw_args = os.environ.get("INPUT_JMH_ARGS", "")
          tokens = shlex.split(raw_args)

          engine_pattern = option_value(tokens, "--engine")
          if engine_pattern:
              try:
                  engine_regex = re.compile(engine_pattern)
              except re.error as exc:
                  raise SystemExit(f"--engine 正则无效: {exc}")
              selected_engines = [engine for engine in engines if engine_regex.fullmatch(engine)]
              if not selected_engines:
                  raise SystemExit(f"--engine 没有匹配任何引擎: {engine_pattern}")
          else:
              selected_engines = engines

          phase_value = option_value(tokens, "--phase")
          if phase_value:
              selected_phases = None
              for canonical, aliases in phase_aliases.items():
                  if phase_value in aliases:
                      selected_phases = phases if canonical == "all" else [canonical]
                      break
              if selected_phases is None:
                  raise SystemExit("--phase 仅支持 compile / compiledExecution / interpretedExecution / all")
          else:
              selected_phases = phases

          extra_tokens = strip_options(tokens, {"--engine", "--phase"})
          matrix = {
              "include": [
                  {"engine": engine, "phase": phase}
                  for engine in selected_engines
                  for phase in selected_phases
              ]
          }
          extra_jmh_args = shlex.join(extra_tokens)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={json.dumps(matrix, separators=(',', ':'))}\n")
              output.write("extra_jmh_args<<EOF\n")
              output.write(extra_jmh_args)
              output.write("\nEOF\n")
          PY

  benchmark:
    name: ${{ matrix.engine }} / ${{ matrix.phase }}
    runs-on: ubuntu-latest
    needs: prepare-matrix
    env:
      JAVA_TOOL_OPTIONS: >-
        --enable-native-access=ALL-UNNAMED
        --sun-misc-unsafe-memory-access=allow
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Prepare Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run benchmark
        env:
          EXTRA_JMH_ARGS: ${{ needs.prepare-matrix.outputs.extra_jmh_args }}
          ENABLE_JFR: ${{ inputs.enable_jfr }}
          MATRIX_ENGINE: ${{ matrix.engine }}
          MATRIX_PHASE: ${{ matrix.phase }}
        run: |
          mkdir -p build/reports/jmh build/reports/jfr
          JMH_ARGS="--quick --engine $MATRIX_ENGINE --phase $MATRIX_PHASE ${EXTRA_JMH_ARGS:-}"

          if [[ "$ENABLE_JFR" == "true" ]]; then
            ./gradlew runScriptBenchmark -PenableJfr=true -PjmhArgs="$JMH_ARGS"
          else
            ./gradlew runScriptBenchmark -PjmhArgs="$JMH_ARGS"
          fi

      - name: Collect benchmark files
        if: always()
        env:
          MATRIX_ENGINE: ${{ matrix.engine }}
          MATRIX_PHASE: ${{ matrix.phase }}
        run: |
          mkdir -p build/reports/jmh/results build/reports/jfr
          if [[ -f build/reports/jmh/results.json ]]; then
            cp build/reports/jmh/results.json "build/reports/jmh/results/results-${MATRIX_ENGINE}-${MATRIX_PHASE}.json"
          fi
          find . -maxdepth 2 -type f -name '*.jfr' ! -path './build/reports/jfr/*' -exec mv '{}' build/reports/jfr/ \;

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: script-jmh-result-${{ matrix.engine }}-${{ matrix.phase }}-${{ github.run_number }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            build/reports/jmh/results/*.json
            build/reports/jfr/*.jfr

  report:
    name: Merge benchmark report
    runs-on: ubuntu-latest
    needs:
      - prepare-matrix
      - benchmark
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download benchmark artifacts
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          pattern: script-jmh-result-*-${{ github.run_number }}
          path: build/reports/jmh/downloaded
          merge-multiple: true

      - name: Generate Markdown report
        env:
          INPUT_JMH_ARGS: ${{ inputs.jmh_args }}
          ENABLE_JFR: ${{ inputs.enable_jfr }}
        run: |
          mkdir -p build/reports/jmh
          if [[ -n "$(find build/reports/jmh/downloaded -type f -name '*.json' -print -quit 2>/dev/null)" ]]; then
            python3 scripts/generate-jmh-report.py \
              --input build/reports/jmh/downloaded \
              --output build/reports/jmh/report.md \
              --jfr "$ENABLE_JFR" \
              --args "GitHub Actions matrix: --quick ${INPUT_JMH_ARGS:-}"
          else
            cat > build/reports/jmh/report.md <<'EOF'
          # 脚本引擎 JMH 性能测试报告

          本次执行未下载到任何 JMH JSON 结果。
          请查看上传的 Gradle/JMH 日志与其它产物定位原因。
          EOF
          fi

      - name: Publish report to job summary
        run: cat build/reports/jmh/report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload merged benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: script-jmh-report-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            build/reports/jmh/report.md
            build/reports/jmh/downloaded/**
